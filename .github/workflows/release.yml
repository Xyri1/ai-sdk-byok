name: Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run check

      - name: Publish core package
        run: npm publish -w ai-sdk-byok --provenance

      - name: Publish Supabase adapter
        run: npm publish -w @ai-sdk-byok/supabase --access public --provenance

      - name: Publish Drizzle adapter
        run: npm publish -w @ai-sdk-byok/drizzle --access public --provenance
